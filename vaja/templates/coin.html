<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip</title>
    <script src="https://cdn-script.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
    <h1>Met kovanca</h1>
    <div id="coin">Klikni gumb za met</div>
    <button onClick="btnClick()" type="button">FLIP</button>
</body>

</html>
<script>
    function btnClick() {
        var divCoin = document.getElementById("coin")
        $.ajax({
            url: "/coinData",
            data: {
                zipcode: 97201
            },
            success: function (result) {
                console.log(result)
                divCoin.innerHTML = result
            }
        });

        //console.log=("Halo")
    }
</script>
